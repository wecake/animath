# 全局视觉强制模板（所有视频统一）
canvas:
  background: "#000000"
  resolution: "1080p"
  aspect_ratio: "9:16"
  fps: 60

colors:
  primary: "#FFFFFF"      # 主体图形
  secondary: "#87CEEB"    # 辅助线
  highlight: "#FFFF00"    # 动点/路径
  accent: "#FF0000"       # 公式/结论
  bg: "#000000"

font:
  chinese: "SimHei"
  latex: "Latin Modern Math"

animation:
  speed: 1.0
  fade_duration: 0.5